<!DOCTYPE html>
<html>
    <head>
        <title>Rock-Paper-Scissors Game</title>
    </head>

    <body>
        <p>Rock Paper Scissors!!!</p>
        <button onclick="
            playGame('rock');">Rock</button>
        <button onclick="
            playGame('paper');">Paper</button>
        <button onclick="
            playGame('scissors');">Scissors</button>

        <script>
            function pickComputerMove() {
                let computerMove = '';
                const randomNo = Math.random();

                if(randomNo >= 0 && randomNo < 1/3) 
                    computerMove = 'rock';
                else if(randomNo >= 1/3 && randomNo < 2/3)
                    computerMove = 'paper';
                else if(randomNo >= 2/3 && randomNo < 1)
                    computerMove = 'scissors';

                return computerMove;
            }

            function playGame(playersMove) {
                let res = '';
                const computerMove = pickComputerMove();

                if(playersMove === 'rock') {
                    if(computerMove === 'rock')
                        res = 'Tie!!!';
                    else if(computerMove === 'paper')
                        res = 'You lose!';
                    else if(computerMove === 'scissors')
                        res = 'You win!!';
                } else if(playersMove === 'paper') {
                    if(computerMove === 'paper')
                        res = 'Tie!!!';
                    else if(computerMove === 'scissors')
                        res = 'You lose!';
                    else if(computerMove === 'rock')
                        res = 'You win!!';
                } else if(playersMove === 'scissors') {
                    if(computerMove === 'scissors')
                        res = 'Tie!!!';
                    else if(computerMove === 'rock')
                        res = 'You lose!';
                    else if(computerMove === 'paper')
                        res = 'You win!!';
                }

                alert(`You picked ${playersMove}, Computer picked ${computerMove}. ${res}`);
            }
        </script>
    </body>
</html>
