<!DOCTYPE html>
<html>
    <head>
        <title>Rock-Paper-Scissors Game</title>
        <link rel="stylesheet" href="styles/rock-paper-scissors.css">
    </head>

    <body>
        <p class="title">Rock Paper Scissors</p>
        <button onclick="
            playGame('rock');" class="emoji-button"><img src="images/rock-emoji.png" class="image"></button>
        <button onclick="
            playGame('paper');" class="emoji-button"><img src="images/paper-emoji.png" class="image"></button>
        <button onclick="
            playGame('scissors');" class="emoji-button"><img src="images/scissors-emoji.png" class="image"></button>

        <p class="js-result result"></p>
        <p class="js-moves moves"></p>
        <p class="js-score score"></p>

        <button onclick="
            score.wins = 0;
            score.losses = 0;
            score.ties = 0;
            localStorage.removeItem('score');
            updateScore();" class="reset-button">Reset Score</button>

        <script src="scripts/rock-paper-scissors.js"></script>
    </body>
</html>
